<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>FIB Bewerbung</title>
    <meta name="description" content="FIB-BEWERBUNG" />
    <meta name="author" content="FIB" />

    <style>
      * {
        -webkit-user-select: none; /* Safari */
        -ms-user-select: none;     /* IE/Edge */
        user-select: none;         /* Standard */
        -webkit-user-drag: none;   /* Verhindert das Ziehen von Bildern */
      }
    </style>

    <meta property="og:title" content="FIB" />
    <meta property="og:description" content="FIB" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="FIB-BEWERBUNG" />
    <meta name="twitter:image" content="" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Deaktiviert Rechtsklick
      document.addEventListener('contextmenu', (e) => e.preventDefault());

      // Deaktiviert Strg+C (Kopieren), Strg+U (Quellcode), Strg+S (Speichern), F12 (Konsole)
      document.addEventListener('keydown', (e) => {
        if (
          e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'p') ||
          e.key === 'F12'
        ) {
          e.preventDefault();
          return false;
        }
      });
    </script>
  </body>
</html>
