<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>FIB Bewerbung</title>
    <meta name="description" content="FIB-BEWERBUNG" />
    <meta name="author" content="FIB" />

    <style>
      * {
        -webkit-user-select: none; 
        -ms-user-select: none;     
        user-select: none;         
        -webkit-user-drag: none;   
      }
    </style>

    <meta property="og:title" content="FIB" />
    <meta property="og:description" content="FIB" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="" />

    <meta name="twitter:card" content="" />
    <meta name="twitter:site" content="FIB-BEWERBUNG" />
    <meta name="twitter:image" content="" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      
      document.addEventListener('contextmenu', (e) => e.preventDefault());

    
      document.addEventListener('keydown', (e) => {
        if (
          e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'p') ||
          e.key === 'F12'
        ) {
          e.preventDefault();
          return false;
        }
      });
    </script>
  </body>
</html>
